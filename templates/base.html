<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}10K Apps{% endblock %}</title>
    <base href="{{ request.script_root|default('', true) }}/">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">10K Sample Apps</div>
        <div class="nav-links">
            <a href="./">Home</a>
            <a href="giwaxs/">GIWAXS Bar</a>
            <a href="rga/">RGA Carrier</a>
        </div>
        <div class="nav-user" id="nav-user-info"></div>
    </nav>

    <div id="alert-container"></div>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" id="modal-confirm">Confirm</button>
            </div>
        </div>
    </div>

    <script src="static/js/shared.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
