<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sample Creation Apps{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Sample Creation Apps</div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}">Home</a>
            <a href="{{ url_for('giwaxs.page') }}">GIWAXS Bar</a>
            <a href="{{ url_for('rga.page') }}">RGA Carrier</a>
            <a href="{{ url_for('b30_sputter.page') }}">B30 Sputter</a>
        </div>
        <div class="nav-user" id="nav-user-info"></div>
    </nav>

    <div id="alert-container"></div>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" id="modal-confirm">Confirm</button>
            </div>
        </div>
    </div>

    <script>const BASE_URL = "{{ request.script_root }}";</script>
    <script src="{{ url_for('static', filename='js/shared.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
